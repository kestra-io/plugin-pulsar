id: realtime
namespace: io.kestra.tests

triggers:
  - id: watch
    type: io.kestra.plugin.pulsar.RealtimeTrigger
    topic: tu_trigger
    uri: pulsar://localhost:26650
    deserializer: JSON
    subscriptionName: tu_trigger_sub

tasks:
  - id: end
    type: io.kestra.plugin.core.debug.Return
    format: "{{task.id}} > {{taskrun.startDate}}"
